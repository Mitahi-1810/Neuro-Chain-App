<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroChain UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;
  background:#0d0a1a;}
body{display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 25% 25%,#1e1040 0%,#0d0a1a 70%);}

/* ── Phone shell ─────────────────────────────── */
.phone{
  width:393px;height:852px;border-radius:52px;overflow:hidden;
  position:relative;
  box-shadow:
    0 0 0 1.5px #2a1f50,
    0 0 0 3px #0d0a1a,
    0 48px 120px rgba(0,0,0,0.75),
    inset 0 1px 0 rgba(255,255,255,0.07);
  background:#FEF9F0;
}
.notch{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:122px;height:36px;background:#0d0a1a;
  border-radius:0 0 22px 22px;z-index:200;
}
.status{
  height:52px;display:flex;align-items:flex-end;
  justify-content:space-between;padding:0 28px 10px;
  position:relative;z-index:10;
}
.status-time{font-size:15px;font-weight:800;color:#2D1A0E;}
.status-icons{display:flex;gap:4px;align-items:center;color:#2D1A0E;font-size:14px;}
.home-bar{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:134px;height:5px;background:#2D1A0E;
  border-radius:3px;opacity:0.18;z-index:200;
}
.area{position:absolute;top:52px;left:0;right:0;bottom:20px;overflow:hidden;}
.scr{height:100%;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.scr::-webkit-scrollbar{display:none;}

/* ── Screen picker ───────────────────────────── */
.picker{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;z-index:300;
  background:rgba(13,10,26,0.9);backdrop-filter:blur(20px);
  border-radius:999px;padding:6px 10px;
  box-shadow:0 8px 40px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06);
}
.pbtn{
  padding:7px 13px;border-radius:999px;font-size:11.5px;font-weight:800;
  cursor:pointer;color:rgba(255,255,255,0.4);font-family:'Nunito',sans-serif;
  border:none;background:transparent;transition:all 0.18s;white-space:nowrap;
  letter-spacing:0.2px;
}
.pbtn.on{background:#FFE94E;color:#3D1A00;}
.pbtn:hover:not(.on){color:rgba(255,255,255,0.75);}

/* ── CSS Animations ──────────────────────────── */
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes bounce{0%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}70%{transform:translateY(-3px);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes fillBar{from{width:0%;}to{width:var(--w);}}
@keyframes ringDraw{from{stroke-dashoffset:283;}to{stroke-dashoffset:var(--offset);}}
@keyframes heartbeat{0%,100%{transform:scale(1);}14%{transform:scale(1.15);}28%{transform:scale(1);}42%{transform:scale(1.08);}70%{transform:scale(1);}}
@keyframes twinkle{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}}
@keyframes waveDot{0%,80%,100%{transform:scale(0);}40%{transform:scale(1);}}
</style>
</head>
<body>
<div class="picker" id="picker"></div>
<div class="phone">
  <div class="notch"></div>
  <div class="status">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <i class="mdi mdi-signal-variant"></i>
      <i class="mdi mdi-wifi"></i>
      <i class="mdi mdi-battery-80"></i>
    </div>
  </div>
  <div class="area"><div id="root"></div></div>
  <div class="home-bar"></div>
</div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;

/* ═══════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════ */
const T = {
  // Brand
  yellow:'#FFE94E', yellowDark:'#F5D800', yellowDeep:'#D4B800',
  yellowPale:'#FFFBE6', brown:'#3D1A00', brownMid:'#6B3A1F',

  // Accent family — warm, saturated
  coral:'#FF6B4A',   coralDk:'#D94C2D',  coralLt:'#FFF0EC',
  peach:'#FFAB5C',   peachDk:'#D9832A',  peachLt:'#FFF5E8',
  sky:'#5DB8FF',     skyDk:'#2A7FD9',    skyLt:'#EAF5FF',
  mint:'#3ECF8E',    mintDk:'#1DA066',   mintLt:'#E6FAF2',
  lavender:'#9B7FF5',lavDk:'#6A4FCC',    lavLt:'#F0ECFF',
  rose:'#FF6B9D',    roseDk:'#D93E72',   roseLt:'#FFF0F6',
  teal:'#2EC4C4',    tealDk:'#169090',   tealLt:'#E5FAFA',

  // Neutral surfaces
  cream:'#FEF9F0', white:'#FFFFFF',
  surfAlt:'#F7F3EE', surfCard:'#FFFFFF',
  borderWarm:'#EDE0D0', borderMid:'#E2D5C5',

  // Text
  ink:'#1E0E00', inkBody:'#4A2E1A', inkMuted:'#9B7A65', inkLight:'#C4A898',

  // Game / skill
  skillMotor:  {bg:'#FFF5E8',border:'#FFAB5C',icon:'#FF8C00',dk:'#D97A00'},
  skillEye:    {bg:'#E5FAFA',border:'#2EC4C4',icon:'#169090',dk:'#0E6B6B'},
  skillEmotion:{bg:'#FFF0F6',border:'#FF6B9D',icon:'#D93E72',dk:'#A82D56'},
  skillImit:   {bg:'#F0ECFF',border:'#9B7FF5',icon:'#6A4FCC',dk:'#4A35A0'},
  skillCat:    {bg:'#FFF0EC',border:'#FF6B4A',icon:'#D94C2D',dk:'#A83820'},
  skillAudio:  {bg:'#E6FAF2',border:'#3ECF8E',icon:'#1DA066',dk:'#127A4A'},

  skillNarr:   {bg:'#FFFBE6',border:'#FFE94E',icon:'#D4B800',dk:'#A08C00'},
};

function hex2rgb(hex){
  const n=parseInt(hex.replace('#',''),16);
  return [(n>>16)&255,(n>>8)&255,n&255];
}
function darken(hex,pct=15){
  const [r,g,b]=hex2rgb(hex);
  const f=1-pct/100;
  return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
}
function alpha(hex,a){const [r,g,b]=hex2rgb(hex);return `rgba(${r},${g},${b},${a})`;}

/* ═══════════════════════════════════════════════
   SVG ILLUSTRATIONS (no emoji)
═══════════════════════════════════════════════ */

function Sparkle({size=16,color=T.yellow,style={},delay=0}){

}

// Animated brain icon (logo mark)

// Flame / streak

// Heart
function HeartIcon({size=22,color='#FF6B9D',filled=true}){

// Star / XP gem
function GemIcon({size=24,color=T.sky}){

      <path d="M2 8h20M9 2l-3 6 6 14 6-14-3-6" stroke={darken(color,25)} strokeWidth="0.8" fill="none"/>

// Trophy
function TrophyIcon({size=28,color=T.yellow}){

    <svg width={size} height={size} viewBox="0 0 24 24">
      <path d="M12 15c-4 0-7-3-7-7V4h14v4c0 4-3 7-7 7z" fill={color} stroke={T.brown} strokeWidth="1.5"/>
      <path d="M5 6H2v2c0 2 1.5 3.5 3 4" stroke={T.brown} strokeWidth="1.5" fill="none" strokeLinecap="round"/>
      <path d="M19 6h3v2c0 2-1.5 3.5-3 4" stroke={T.brown} strokeWidth="1.5" fill="none" strokeLinecap="round"/>
      <rect x="9" y="15" width="6" height="3" fill={darken(color,10)} stroke={T.brown} strokeWidth="1.2"/>
      <rect x="7" y="18" width="10" height="2" rx="1" fill={darken(color,5)} stroke={T.brown} strokeWidth="1.2"/>
    </svg>

}

// Shield (completed)
function CheckCircle({size=28,color=T.mint}){
  return (
    <svg width={size} height={size} viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill={color} stroke={darken(color,20)} strokeWidth="1.8"/>
      <path d="M7 12.5l3.5 3.5 6.5-7" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
    </svg>

}

// Lock
function LockIcon({size=24,color=T.inkLight}){
  return (
    <svg width={size} height={size} viewBox="0 0 24 24">
      <rect x="5" y="11" width="14" height="11" rx="3" fill={T.surfAlt} stroke={color} strokeWidth="1.8"/>
      <path d="M8 11V7a4 4 0 0 1 8 0v4" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round"/>
      <circle cx="12" cy="16" r="2" fill={color}/>
      <line x1="12" y1="18" x2="12" y2="20" stroke={color} strokeWidth="1.8" strokeLinecap="round"/>

}

// Crown
function CrownIcon({size=20,color=T.yellow}){
  return (
    <svg width={size} height={size} viewBox="0 0 24 24">
      <path d="M3 17L6 8l4.5 5L12 6l1.5 7L18 8l3 9H3z"
        fill={color} stroke={T.brown} strokeWidth="1.5" strokeLinejoin="round"/>
      <circle cx="6" cy="8" r="1.5" fill={T.brown}/>
      <circle cx="12" cy="6" r="1.5" fill={T.brown}/>

// Play button
function PlayIcon({size=20,color='white'}){
  return (
    <svg width={size} height={size} viewBox="0 0 24 24">
      <polygon points="5,3 19,12 5,21" fill={color}/>
    </svg>

}

/* ─── Mascot: friendly creature head ─── */
function Mascot({size=64}){
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 64 64" style={{animation:'float 3s ease-in-out infinite',flexShrink:0}}>
      {/* Body */}
      <ellipse cx="32" cy="40" rx="20" ry="16" fill={T.yellow} stroke={T.brown} strokeWidth="2"/>
      {/* Head */}
      <circle cx="32" cy="26" r="18" fill={T.yellow} stroke={T.brown} strokeWidth="2"/>
      {/* Ears */}
      <ellipse cx="16" cy="14" rx="6" ry="8" fill={T.yellow} stroke={T.brown} strokeWidth="2"/>
      <ellipse cx="48" cy="14" rx="6" ry="8" fill={T.yellow} stroke={T.brown} strokeWidth="2"/>
      <ellipse cx="16" cy="14" rx="3" ry="5" fill={T.rose}/>
      <ellipse cx="48" cy="14" rx="3" ry="5" fill={T.rose}/>
      {/* Eyes */}
      <circle cx="26" cy="25" r="5" fill="white" stroke={T.brown} strokeWidth="1.5"/>
      <circle cx="38" cy="25" r="5" fill="white" stroke={T.brown} strokeWidth="1.5"/>
      <circle cx="27" cy="25" r="2.5" fill={T.brown}/>
      <circle cx="39" cy="25" r="2.5" fill={T.brown}/>
      <circle cx="28" cy="24" r="1" fill="white"/>
      <circle cx="40" cy="24" r="1" fill="white"/>
      {/* Blush */}
      <ellipse cx="20" cy="31" rx="4" ry="2.5" fill={T.rose} opacity="0.5"/>
      <ellipse cx="44" cy="31" rx="4" ry="2.5" fill={T.rose} opacity="0.5"/>
      {/* Smile */}
      <path d="M26 33 Q32 39 38 33" fill="none" stroke={T.brown} strokeWidth="2" strokeLinecap="round"/>

      <ellipse cx="32" cy="30" rx="2.5" ry="1.5" fill={T.brownMid} opacity="0.5"/>

/* ─── Loading dots ─── */
function LoadingDots({color=T.coral}){
  return (
    <div style={{display:'flex',gap:5,alignItems:'center',justifyContent:'center',padding:'8px 0'}}>
      {[0,1,2].map(i=>(
        <div key={i} style={{
          width:8,height:8,borderRadius:4,background:color,
          animation:`waveDot 1.4s ease-in-out ${i*0.16}s infinite`,
        }}/>
      ))}
    </div>
  );
}

/* ─── Animated XP ring ─── */
function XPRing({pct=70,size=88,stroke=8}){
  const r = (size-stroke)/2;
  const circ = 2*Math.PI*r;
  const offset = circ*(1-pct/100);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{flexShrink:0}}>
      <defs>
        <linearGradient id="xpG" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor={T.coral}/>
          <stop offset="100%" stopColor={T.peach}/>
        </linearGradient>
      </defs>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.borderWarm} strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="url(#xpG)" strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{transition:'stroke-dashoffset 1.2s cubic-bezier(0.34,1.56,0.64,1)'}}/>
      <text x={size/2} y={size/2+2} textAnchor="middle" dominantBaseline="middle"
        fontFamily="'Baloo 2',sans-serif" fontSize="18" fontWeight="800" fill={T.coral}>{pct}%</text>
    </svg>
  );
}

/* ═══════════════════════════════════════════════
   SHARED COMPONENTS
═══════════════════════════════════════════════ */

/* ── Chunky pill-badge ── */
function Tag({label,color,bg,border,icon}){
  return (
    <span style={{
      display:'inline-flex',alignItems:'center',gap:5,
      background:bg,border:`1.5px solid ${border||darken(bg,10)}`,
      color,padding:'4px 11px',borderRadius:999,
      fontSize:11,fontWeight:800,fontFamily:"'Nunito',sans-serif",
      letterSpacing:0.2,
    }}>
      {icon}
      {label}
    </span>
  );
}

/* ── Duolingo-style press button ── */
function DBtn({label,color=T.yellow,textColor=T.brown,icon,onClick,full,size='md',disabled}){
  const [dn,setDn]=useState(false);
  const sh = darken(color,22);
  const sizes={sm:{h:40,fs:13,px:18},md:{h:52,fs:15,px:26},lg:{h:60,fs:17,px:32}};
  const sz=sizes[size]||sizes.md;
  return (
    <button
      onPointerDown={()=>!disabled&&setDn(true)}
      onPointerUp={()=>setDn(false)}
      onPointerLeave={()=>setDn(false)}
      onClick={disabled?undefined:onClick}
      disabled={disabled}
      style={{
        width:full?'100%':undefined,height:sz.h,
        padding:`0 ${sz.px}px`,
        background:disabled?T.borderWarm:color,
        color:disabled?T.inkLight:textColor,
        border:'none',borderRadius:16,cursor:disabled?'not-allowed':'pointer',
        fontFamily:"'Baloo 2',sans-serif",fontSize:sz.fs,fontWeight:800,
        letterSpacing:0.3,
        boxShadow:dn?'none':`0 5px 0 ${disabled?T.borderMid:sh}`,
        transform:dn?'translateY(4px)':'translateY(0)',
        transition:'transform 0.08s,box-shadow 0.08s',
        display:'inline-flex',alignItems:'center',justifyContent:'center',gap:8,
        flexShrink:0,
      }}
    >
      {icon&&<span style={{display:'flex',alignItems:'center'}}>{icon}</span>}
      {label}
    </button>
  );
}

/* ── Section title ── */
function STitle({children,sub}){
  return (
    <div style={{marginBottom:12}}>
      <div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:18,fontWeight:800,
        color:T.ink,letterSpacing:-0.2}}>{children}</div>
      {sub&&<div style={{fontFamily:"'Nunito',sans-serif",fontSize:12,color:T.inkMuted,
        fontWeight:600,marginTop:2}}>{sub}</div>}
    </div>
  );
}

/* ── Card ── */
function Card({children,style={},color=T.white,border=T.borderWarm,shadow=true}){
  return (
    <div style={{
      background:color,
      border:`2px solid ${border}`,
      borderRadius:20,
      boxShadow:shadow?`0 4px 0 ${darken(border,8)}`:'none',
      ...style,
    }}>{children}</div>
  );
}

/* ── Animated progress bar ── */
function ProgressBar({pct,color=T.coral,height=10,animated=true,style={}}){
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&animated){
      ref.current.style.width='0%';
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          if(ref.current) ref.current.style.width=`${pct}%`;
        });
      });
    }
  },[pct]);
  return (
    <div style={{
      height,background:T.borderWarm,borderRadius:999,
      overflow:'hidden',border:`1.5px solid ${T.borderMid}`,...style
    }}>
      <div ref={ref} style={{
        height:'100%',width:animated?'0%':`${pct}%`,
        background:`linear-gradient(90deg,${color},${darken(color,-10)})`,
        borderRadius:999,
        transition:animated?'width 1.1s cubic-bezier(0.34,1.56,0.64,1)':'none',
      }}/>
    </div>
  );
}

/* ── Bottom nav ── */
const NAV=[
  {id:'home',icon:'home-variant',label:'Home'},
  {id:'games',icon:'controller-classic-outline',label:'Games'},
  {id:'reports',icon:'chart-areaspline',label:'Progress'},
  {id:'store',icon:'shopping-outline',label:'Store'},
  {id:'profile',icon:'account-circle-outline',label:'Me'},
];
function BottomNav({active,onNav,tier='BASIC'}){
  return (
    <div style={{

        return (
          <div key={tab.id} onClick={()=>!locked&&onNav(tab.id)} style={{

          </div>
        );
      })}
    </div>

}

function Field({label,icon,placeholder,type='text',value,onChange,onFocus,onBlur,focused,right}){
  return (
    <div style={{marginBottom:16}}>
      {label&&<div style={{
        fontFamily:"'Nunito',sans-serif",fontSize:12,fontWeight:800,

  );
}

const QS=[
  {q:"If you point at something across the room, does your child look at it?",icon:'cursor-pointer'},
  {q:"Have you ever wondered if your child might be deaf?",icon:'ear-hearing'},
  {q:"Does your child play pretend or make-believe?",icon:'drama-masks'},
  {q:"Does your child like climbing on things?",icon:'human-child'},
  {q:"Does your child make unusual finger movements near his or her eyes?",icon:'hand-wave-outline'},
  {q:"Does your child point with one finger to ask for something?",icon:'gesture-tap'},
  {q:"Does your child point to show you something interesting?",icon:'lightbulb-on-outline'},
  {q:"Is your child interested in other children?",icon:'account-group-outline'},
  {q:"Does your child show you things by bringing them to you?",icon:'gift-outline'},
  {q:"Does your child respond when you call his or her name?",icon:'text-to-speech'},
];

function ScreenerScreen({goTo}){
  const [qi,setQi]=useState(0);
  const [answers,setAnswers]=useState({});
  const [dir,setDir]=useState(1);
  const total=20;
  const pct=Math.round((qi/total)*100);
  const q=QS[qi%QS.length];

  const answer=(a)=>{
    setAnswers(p=>({...p,[qi]:a}));
    setDir(1);
    if(qi<total-1) setTimeout(()=>setQi(n=>n+1),350);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:T.cream}}>
      {/* Top bar */}
      <div style={{
        background:`linear-gradient(160deg,${T.skyLt} 0%,${T.lavLt} 100%)`,
        padding:'12px 18px 16px',borderBottom:`2px solid ${T.borderWarm}`,
      }}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <button onClick={()=>qi>0?setQi(n=>{setDir(-1);return n-1;}):goTo('home')} style={{
            width:40,height:40,borderRadius:14,background:T.white,
            border:`2px solid ${T.borderWarm}`,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:`0 3px 0 ${T.borderMid}`,flexShrink:0,
          }}>
            <i className="mdi mdi-arrow-left" style={{fontSize:20,color:T.ink}}/>
          </button>
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',
              fontFamily:"'Nunito',sans-serif",fontSize:12,fontWeight:800,
              color:T.inkMuted,marginBottom:5}}>
              <span>Question {qi+1} of {total}</span>
              <span style={{color:T.coral,fontWeight:800}}>{pct}%</span>
            </div>
            <ProgressBar pct={pct} color={T.coral} height={10}/>
          </div>
        </div>
        <div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:16,fontWeight:800,color:T.ink}}>
          M-CHAT Screener
        </div>
        <div style={{fontFamily:"'Nunito',sans-serif",fontSize:11,color:T.inkMuted,
          fontWeight:600,marginTop:1}}>
          Think about the past 2 weeks when answering
        </div>
      </div>

      {/* Question area */}
      <div style={{flex:1,display:'flex',flexDirection:'column',padding:'16px 16px 0',gap:12}}>
        {/* Mascot hint */}
        <div style={{
          background:T.yellowPale,border:`2px solid ${T.borderWarm}`,
          borderRadius:18,padding:'12px 16px',
          display:'flex',alignItems:'center',gap:12,
          boxShadow:`0 3px 0 ${T.borderMid}`,
        }}>
          <Mascot size={48}/>
          <div style={{fontFamily:"'Nunito',sans-serif",fontSize:12,
            color:T.inkBody,fontWeight:700,lineHeight:1.5}}>
            Take your time! There are no wrong answers. Be as honest as you can.
          </div>
        </div>

        {/* Question card */}
        <div style={{
          flex:1,
          background:T.white,border:`2.5px solid ${T.yellow}`,
          borderRadius:24,padding:'22px 20px',
          boxShadow:`0 6px 0 ${T.yellowDeep}`,
          display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',
          textAlign:'center',gap:16,
          animation:'fadeUp 0.3s ease both',
        }}>
          <div style={{
            width:70,height:70,borderRadius:22,
            background:`linear-gradient(135deg,${T.yellowPale},${T.peachLt})`,
            border:`2px solid ${T.borderWarm}`,
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:`0 4px 0 ${T.borderMid}`,
          }}>
            <i className={`mdi mdi-${q.icon}`} style={{fontSize:34,color:T.peachDk}}/>
          </div>
          <div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:17,fontWeight:800,
            color:T.ink,lineHeight:1.5}}>
            {q.q}
          </div>
        </div>

        {/* YES / NO buttons */}
        <div style={{display:'flex',gap:10,paddingBottom:16}}>
          <DBtn label="YES" full color={T.mint} textColor="#fff" size="lg"
            icon={<i className="mdi mdi-check-bold" style={{fontSize:20}}/>}
            onClick={()=>answer('yes')}/>
          <DBtn label="NO" full color={T.rose} textColor="#fff" size="lg"
            icon={<i className="mdi mdi-close-thick" style={{fontSize:20}}/>}
            onClick={()=>answer('no')}/>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════ */
const SCREENS=[
  {id:'welcome',  label:'Welcome'},
  {id:'login',    label:'Login'},
  {id:'signup',   label:'Sign Up'},
  {id:'home',     label:'Home'},
  {id:'games',    label:'Games'},
  {id:'screener', label:'Screener'},
  {id:'specialist',label:'Specialist'},
];

function App(){
  const [screen,setScreen]=useState('welcome');

  useEffect(()=>{
    const el=document.getElementById('picker');
    if(!el) return;
    el.innerHTML='';
    SCREENS.forEach(s=>{
      const b=document.createElement('button');
      b.className=`pbtn${screen===s.id?' on':''}`;
      b.textContent=s.label;
      b.onclick=()=>setScreen(s.id);
      el.appendChild(b);
    });
  },[screen]);

  const MAP={
    welcome:    <WelcomeScreen goTo={setScreen}/>,
    login:      <LoginScreen   goTo={setScreen}/>,
    signup:     <SignUpScreen  goTo={setScreen}/>,
    home:       <HomeScreen    goTo={setScreen}/>,
    games:      <GamesScreen   goTo={setScreen}/>,
    screener:   <ScreenerScreen goTo={setScreen}/>,
    specialist: <SpecialistScreen/>,
  };

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {MAP[screen]||MAP.welcome}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
