<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroChain UI Kit — Print</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'Nunito', sans-serif;
  background: #f0ebf8;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* ── Print page layout ── */
@page { size: landscape; margin: 0; }

@media print {
  html, body { background: #fff; }
  .page { break-before: page; break-inside: avoid; }
  .page:first-child { break-before: auto; }
  .picker-bar { display: none !important; }
  * { animation: none !important; transition: none !important; }
}

/* ── Screen grid (screen preview) ── */
.page {
  width: 100vw; min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 30% 30%, #1e1040 0%, #0d0a1a 70%);
  padding: 32px;
  gap: 0;
  break-inside: avoid;
}

/* Title page */
.page.title-page {
  flex-direction: column;
  background: linear-gradient(160deg, #fffbe6 0%, #fff5e8 50%, #fef0f5 100%);
}

/* ── Phone frame ── */
.frame-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.frame-label {
  font-family: 'Nunito', sans-serif;
  font-size: 11px; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase; color: rgba(255,255,255,0.5);
}
.phone {
  width: 340px; height: 736px;
  border-radius: 46px; overflow: hidden; position: relative;
  box-shadow:
    0 0 0 1.5px #2a1f50,
    0 0 0 3px #0d0a1a,
    0 24px 60px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.07);
  background: #FEF9F0;
  flex-shrink: 0;
}
.notch {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 100px; height: 28px; background: #0d0a1a;
  border-radius: 0 0 18px 18px; z-index: 200;
}
.status {
  height: 44px; display: flex; align-items: flex-end;
  justify-content: space-between; padding: 0 24px 8px;
  position: relative; z-index: 10;
}
.status-time { font-size: 13px; font-weight: 800; color: #2D1A0E; }
.status-icons { display: flex; gap: 4px; align-items: center; color: #2D1A0E; font-size: 12px; }
.home-bar {
  position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
  width: 110px; height: 4px; background: #2D1A0E;
  border-radius: 3px; opacity: 0.18; z-index: 200;
}
.content {
  position: absolute; top: 44px; left: 0; right: 0; bottom: 16px;
  overflow: hidden; background: #FEF9F0;
}

/* ── Tokens (inline) ── */
/* Passed via JS — see script below */

/* ── 2-up layout ── */
.two-up { display: flex; gap: 24px; align-items: flex-start; }
.three-up { display: flex; gap: 18px; align-items: flex-start; }

/* ── Title page elements ── */
.tp-logo-wrap {
  background: #FFE94E; border-radius: 24px; padding: 14px 32px;
  box-shadow: 0 6px 0 #D4B800, 0 0 0 3px rgba(61,26,0,0.12);
  margin-bottom: 16px;
}
.tp-tagline {
  font-family: 'Baloo 2', sans-serif; font-size: 18px; font-weight: 800;
  color: #6B3A1F; margin-bottom: 32px; text-align: center;
}
.tp-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  max-width: 900px;
}
.tp-card {
  background: #fff; border-radius: 18px; padding: 18px;
  border: 2px solid #EDE0D0;
  box-shadow: 0 4px 0 #EDE0D0;
  display: flex; flex-direction: column; gap: 8px;
}
.tp-screen-num {
  font-family: 'Baloo 2', sans-serif; font-size: 11px; font-weight: 800;
  color: #9B7A65; letter-spacing: 1px; text-transform: uppercase;
}
.tp-screen-name {
  font-family: 'Baloo 2', sans-serif; font-size: 16px; font-weight: 800; color: #1E0E00;
}
.tp-screen-desc {
  font-family: 'Nunito', sans-serif; font-size: 12px; color: #9B7A65;
  font-weight: 600; line-height: 1.5;
}
.tp-dot {
  width: 10px; height: 10px; border-radius: 5px; flex-shrink: 0;
}

/* ── Nav bar (static) ── */
.nav-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 58px; background: #fff;
  border-top: 2px solid #EDE0D0;
  display: flex; align-items: center;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; padding-bottom: 2px;
}
.nav-icon { font-size: 19px; }
.nav-lbl { font-size: 9px; font-weight: 800; font-family: 'Nunito', sans-serif; }
.nav-active-bg {
  width: 30px; height: 22px; border-radius: 8px;
  background: #FFF0EC; display: flex; align-items: center; justify-content: center;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const T = {
  yellow:'#FFE94E', yellowDark:'#F5D800', yellowDeep:'#D4B800',
  yellowPale:'#FFFBE6', brown:'#3D1A00', brownMid:'#6B3A1F',
  coral:'#FF6B4A', coralDk:'#D94C2D', coralLt:'#FFF0EC',
  peach:'#FFAB5C', peachDk:'#D9832A', peachLt:'#FFF5E8',
  sky:'#5DB8FF', skyDk:'#2A7FD9', skyLt:'#EAF5FF',
  mint:'#3ECF8E', mintDk:'#1DA066', mintLt:'#E6FAF2',
  lavender:'#9B7FF5', lavDk:'#6A4FCC', lavLt:'#F0ECFF',
  rose:'#FF6B9D', roseDk:'#D93E72', roseLt:'#FFF0F6',
  teal:'#2EC4C4', tealDk:'#169090', tealLt:'#E5FAFA',
  cream:'#FEF9F0', white:'#FFFFFF',
  surfAlt:'#F7F3EE', borderWarm:'#EDE0D0', borderMid:'#E2D5C5',
  ink:'#1E0E00', inkBody:'#4A2E1A', inkMuted:'#9B7A65', inkLight:'#C4A898',
};

function darken(hex, pct=15) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, ((n>>16)&255) - pct*2.5|0);
  const g = Math.max(0, ((n>>8)&255) - pct*2.5|0);
  const b = Math.max(0, (n&255) - pct*2.5|0);
  return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')}`;
}
function alpha(hex, a) {
  const n = parseInt(hex.replace('#',''), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

// ── Shared micro-components ──────────────────────
function StatusBar({ light }) {
  const c = light ? '#fff' : '#2D1A0E';
  return (
    <div className="status">
      <span className="status-time" style={{color:c}}>9:41</span>
      <div className="status-icons" style={{color:c}}>
        <i className="mdi mdi-signal-variant"/>
        <i className="mdi mdi-wifi"/>
        <i className="mdi mdi-battery-80"/>
      </div>
    </div>
  );
}

function Phone({ label, children, bg='#FEF9F0', lightStatus }) {
  return (
    <div className="frame-wrap">
      <div className="frame-label">{label}</div>
      <div className="phone" style={{background:bg}}>
        <div className="notch"/>
        <StatusBar light={lightStatus}/>
        <div className="content">{children}</div>
        <div className="home-bar"/>
      </div>
    </div>
  );
}

function NavBar({ active='home' }) {
  const items = [
    {id:'home', icon:'home-variant', label:'Home'},
    {id:'games', icon:'controller-classic-outline', label:'Games'},
    {id:'reports', icon:'chart-areaspline', label:'Progress'},
    {id:'store', icon:'shopping-outline', label:'Store'},
    {id:'profile', icon:'account-circle-outline', label:'Me'},
  ];
  return (
    <div className="nav-bar">
      {items.map(it => {
        const on = it.id === active;
        return (
          <div key={it.id} className="nav-item">
            <div className={on?'nav-active-bg':''} style={{
              width:30,height:22,borderRadius:8,
              background:on?T.coralLt:'transparent',
              display:'flex',alignItems:'center',justifyContent:'center',
            }}>
              <i className={`mdi mdi-${it.icon} nav-icon`} style={{color:on?T.coral:T.inkLight}}/>
            </div>
            <span className="nav-lbl" style={{color:on?T.coral:T.inkLight}}>{it.label}</span>
          </div>
        );
      })}
    </div>
  );
}

function Tag({ label, color, bg, border }) {
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:4,
      background:bg, border:`1.5px solid ${border||darken(bg,10)}`,
      color, padding:'3px 9px', borderRadius:999,
      fontSize:10, fontWeight:800, fontFamily:"'Nunito',sans-serif",
    }}>{label}</span>
  );
}

function Btn({ label, color=T.yellow, textColor=T.brown, icon, full, sm }) {
  return (
    <div style={{
      display:'inline-flex', alignItems:'center', justifyContent:'center', gap:6,
      background:color, color:textColor,
      borderRadius:14, height:sm?36:46,
      padding:`0 ${sm?14:22}px`,
      fontFamily:"'Baloo 2',sans-serif", fontSize:sm?12:14, fontWeight:800,
      boxShadow:`0 4px 0 ${darken(color,20)}`,
      width:full?'100%':undefined, flexShrink:0,
      letterSpacing:0.2,
    }}>
      {icon&&<i className={`mdi mdi-${icon}`} style={{fontSize:sm?13:16}}/>}
      {label}
    </div>
  );
}

function ProgBar({ pct, color=T.coral, h=9 }) {
  return (
    <div style={{height:h, background:T.borderWarm, borderRadius:999,
      overflow:'hidden', border:`1.5px solid ${T.borderMid}`}}>
      <div style={{height:'100%', width:`${pct}%`,
        background:`linear-gradient(90deg,${color},${darken(color,-10)})`,
        borderRadius:999}}/>
    </div>
  );
}

function Card({ children, style={}, color=T.white, border=T.borderWarm }) {
  return (
    <div style={{
      background:color, border:`2px solid ${border}`,
      borderRadius:18, boxShadow:`0 3px 0 ${darken(border,8)}`, ...style,
    }}>{children}</div>
  );
}

function MascotSVG({ size=44 }) {
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 64 64">
      <ellipse cx="32" cy="40" rx="20" ry="16" fill={T.yellow} stroke={T.brown} strokeWidth="2"/>
      <circle cx="32" cy="26" r="18" fill={T.yellow} stroke={T.brown} strokeWidth="2"/>
      <ellipse cx="16" cy="14" rx="6" ry="8" fill={T.yellow} stroke={T.brown} strokeWidth="2"/>
      <ellipse cx="48" cy="14" rx="6" ry="8" fill={T.yellow} stroke={T.brown} strokeWidth="2"/>
      <ellipse cx="16" cy="14" rx="3" ry="5" fill={T.rose}/>
      <ellipse cx="48" cy="14" rx="3" ry="5" fill={T.rose}/>
      <circle cx="26" cy="25" r="5" fill="white" stroke={T.brown} strokeWidth="1.5"/>
      <circle cx="38" cy="25" r="5" fill="white" stroke={T.brown} strokeWidth="1.5"/>
      <circle cx="27" cy="25" r="2.5" fill={T.brown}/>
      <circle cx="39" cy="25" r="2.5" fill={T.brown}/>
      <circle cx="28" cy="24" r="1" fill="white"/>
      <circle cx="40" cy="24" r="1" fill="white"/>
      <ellipse cx="20" cy="31" rx="4" ry="2.5" fill={T.rose} opacity="0.5"/>
      <ellipse cx="44" cy="31" rx="4" ry="2.5" fill={T.rose} opacity="0.5"/>
      <path d="M26 33 Q32 39 38 33" fill="none" stroke={T.brown} strokeWidth="2" strokeLinecap="round"/>
      <ellipse cx="32" cy="30" rx="2.5" ry="1.5" fill={T.brownMid} opacity="0.5"/>
    </svg>
  );
}

function FlameSVG({ size=26 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 32 32">
      <defs>
        <linearGradient id="fg" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stopColor="#FF4500"/>
          <stop offset="50%" stopColor="#FF8C00"/>
          <stop offset="100%" stopColor="#FFE94E"/>
        </linearGradient>
      </defs>
      <path d="M16 3C16 3 20 9 20 13C20 13 22 10 21 7C21 7 26 12 26 18C26 24.6 21.5 29 16 29C10.5 29 6 24.6 6 18C6 13 10 9 10 9C10 9 11 13 13 14C13 14 11 10 16 3Z"
        fill="url(#fg)" stroke={T.brown} strokeWidth="1.2" strokeLinejoin="round"/>
      <path d="M16 16C16 16 18 19 18 21.5C18 23 17.1 24 16 24C14.9 24 14 23 14 21.5C14 19 16 16 16 16Z"
        fill="rgba(255,255,255,0.7)"/>
    </svg>
  );
}

function GemSVG({ size=22, color=T.sky }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24">
      <path d="M6 2L2 8l10 14L22 8l-4-6H6z" fill={color} stroke={darken(color,20)} strokeWidth="1.2" strokeLinejoin="round"/>
      <path d="M9 8l3 10 3-10" fill="rgba(255,255,255,0.25)"/>
    </svg>
  );
}

function TrophySVG({ size=24, color=T.yellow }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24">
      <path d="M12 15c-4 0-7-3-7-7V4h14v4c0 4-3 7-7 7z" fill={color} stroke={T.brown} strokeWidth="1.5"/>
      <path d="M5 6H2v2c0 2 1.5 3.5 3 4" stroke={T.brown} strokeWidth="1.5" fill="none" strokeLinecap="round"/>
      <path d="M19 6h3v2c0 2-1.5 3.5-3 4" stroke={T.brown} strokeWidth="1.5" fill="none" strokeLinecap="round"/>
      <rect x="9" y="15" width="6" height="3" fill={darken(color,10)} stroke={T.brown} strokeWidth="1.2"/>
      <rect x="7" y="18" width="10" height="2" rx="1" fill={darken(color,5)} stroke={T.brown} strokeWidth="1.2"/>
    </svg>
  );
}

function CrownSVG({ size=14, color=T.yellow }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24">
      <path d="M3 17L6 8l4.5 5L12 6l1.5 7L18 8l3 9H3z" fill={color} stroke={T.brown} strokeWidth="1.5" strokeLinejoin="round"/>
    </svg>
  );
}

function CheckCircleSVG({ size=24, color=T.mint }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill={color} stroke={darken(color,20)} strokeWidth="1.8"/>
      <path d="M7 12.5l3.5 3.5 6.5-7" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
    </svg>
  );
}

function LockSVG({ size=22, color=T.inkLight }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24">
      <rect x="5" y="11" width="14" height="11" rx="3" fill={T.surfAlt} stroke={color} strokeWidth="1.8"/>
      <path d="M8 11V7a4 4 0 0 1 8 0v4" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round"/>
      <circle cx="12" cy="16" r="2" fill={color}/>
    </svg>
  );
}

// ══════════════════════════════════════════════
// STATIC SCREEN RENDERERS
// ══════════════════════════════════════════════

// 1. WELCOME
function WelcomeContent() {
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',position:'relative',overflow:'hidden',background:'#FEF9F0'}}>
      <div style={{
        position:'absolute',top:0,left:0,right:0,height:'50%',
        backgroundImage:`url(../../assets/meadow-bg.png)`,
        backgroundSize:'cover',backgroundPosition:'top center',
        opacity:0.9,
      }}/>
      <div style={{
        position:'absolute',top:0,left:0,right:0,height:'50%',
        background:'linear-gradient(180deg,transparent 40%,#FEF9F0 100%)',
      }}/>
      <div style={{position:'relative',zIndex:2,display:'flex',flexDirection:'column',
        alignItems:'center',paddingTop:30}}>
        <div style={{
          background:T.yellow,borderRadius:20,padding:'7px 18px',
          boxShadow:`0 4px 0 ${T.yellowDeep}`,marginBottom:6,
        }}>
          <img src="../../assets/logo.jpeg" alt="NeuroChain"
            style={{width:130,height:40,objectFit:'contain',mixBlendMode:'multiply',display:'block'}}/>
        </div>
        <div style={{fontFamily:"'Nunito',sans-serif",fontSize:11,fontWeight:700,
          color:T.brownMid,letterSpacing:0.2}}>Your child's therapy adventure</div>
      </div>
      <div style={{
        position:'absolute',bottom:0,left:0,right:0,
        background:T.white,borderRadius:'24px 24px 0 0',
        border:`2px solid ${T.borderWarm}`,borderBottom:'none',
        padding:'18px 18px 14px',
        boxShadow:'0 -6px 20px rgba(61,26,0,0.07)',
        zIndex:3,
      }}>
        {[
          {icon:'controller-classic',color:T.coral,bg:T.coralLt,border:T.coral,title:'Daily Therapy Games',desc:'8 ABA-based games your child will love'},
          {icon:'chart-line',color:T.sky,bg:T.skyLt,border:T.sky,title:'Track Every Milestone',desc:'AI-powered insights and progress charts'},
          {icon:'stethoscope',color:T.mint,bg:T.mintLt,border:T.mint,title:'Connect with Specialists',desc:'Telehealth with certified autism experts'},
        ].map((f,i)=>(
          <div key={i} style={{
            display:'flex',alignItems:'center',gap:10,
            background:f.bg,border:`2px solid ${f.border}`,
            borderRadius:14,padding:'9px 12px',marginBottom:8,
            boxShadow:`0 2px 0 ${darken(f.border,15)}`,
          }}>
            <div style={{
              width:34,height:34,borderRadius:10,background:T.white,
              border:`2px solid ${f.border}`,
              display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
            }}>
              <i className={`mdi mdi-${f.icon}`} style={{fontSize:18,color:f.color}}/>
            </div>
            <div>
              <div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:12,fontWeight:800,
                color:T.ink,marginBottom:1}}>{f.title}</div>
              <div style={{fontFamily:"'Nunito',sans-serif",fontSize:10,color:T.inkMuted,
                fontWeight:600}}>{f.desc}</div>
            </div>
          </div>
        ))}
        <Btn label="Get Started" full color={T.yellow} textColor={T.brown} icon="arrow-right"/>
      </div>
    </div>
  );
}

// 2. LOGIN
function LoginContent() {
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:T.cream}}>
      <div style={{
        background:`linear-gradient(160deg,${T.yellowPale} 0%,${T.peachLt} 100%)`,
        padding:'12px 16px 18px',borderBottom:`2px solid ${T.borderWarm}`,
      }}>
        <div style={{
          width:32,height:32,borderRadius:10,background:T.white,
          border:`2px solid ${T.borderWarm}`,
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:`0 2px 0 ${T.borderMid}`,marginBottom:12,
        }}>
          <i className="mdi mdi-arrow-left" style={{fontSize:16,color:T.ink}}/>
        </div>
        <div style={{background:T.yellow,borderRadius:14,padding:'6px 14px',
          boxShadow:`0 3px 0 ${T.yellowDeep}`,display:'inline-block',marginBottom:8}}>
          <img src="../../assets/logo.jpeg" alt="NeuroChain"
            style={{width:100,height:32,objectFit:'contain',mixBlendMode:'multiply',display:'block'}}/>
        </div>
        <div style={{fontFamily:"'Nunito',sans-serif",fontSize:12,color:T.brownMid,fontWeight:700}}>
          Welcome back! Let's keep going.
        </div>
      </div>
      <div style={{flex:1,padding:'16px 16px 0',overflow:'hidden'}}>
        {['Email Address','Password'].map((lbl,i)=>(
          <div key={i} style={{marginBottom:12}}>
            <div style={{fontFamily:"'Nunito',sans-serif",fontSize:10,fontWeight:800,
              color:T.inkBody,marginBottom:4,letterSpacing:0.4,textTransform:'uppercase'}}>{lbl}</div>
            <div style={{
              display:'flex',alignItems:'center',gap:8,background:T.white,
              borderRadius:13,padding:'0 12px',height:46,
              border:`2px solid ${T.borderWarm}`,boxShadow:`0 2px 0 ${T.borderWarm}`,
            }}>
              <i className={`mdi mdi-${i===0?'email-outline':'lock-outline'}`}
                style={{fontSize:17,color:T.inkLight}}/>
              <span style={{fontFamily:"'Nunito',sans-serif",fontSize:13,color:T.inkLight}}>
                {i===0?'your@email.com':'••••••••'}
              </span>
            </div>
          </div>
        ))}
        <div style={{textAlign:'right',marginBottom:14}}>
          <span style={{fontSize:11,color:T.coral,fontWeight:800,fontFamily:"'Nunito',sans-serif"}}>Forgot password?</span>
        </div>
        <Btn label="Sign In" full color={T.yellow} textColor={T.brown}/>
        <div style={{display:'flex',alignItems:'center',gap:10,margin:'14px 0 12px'}}>
          <div style={{flex:1,height:1.5,background:T.borderWarm}}/>
          <span style={{fontSize:11,color:T.inkMuted,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>or</span>
          <div style={{flex:1,height:1.5,background:T.borderWarm}}/>

              <i className={`mdi mdi-${k.icon}`} style={{fontSize:20,color:k.color}}/>
              <div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:18,fontWeight:800,
                color:T.ink,margin:'4px 0 2px'}}>{k.value}</div>
              <div style={{fontFamily:"'Nunito',sans-serif",fontSize:9,
                color:T.inkMuted,fontWeight:700,lineHeight:1.3}}>{k.label}</div>
            </div>
          ))}
        </div>
        <div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:13,fontWeight:800,
          color:T.ink,marginBottom:7}}>Today's Appointments</div>
        {apts.map(a=>(
          <div key={a.name} style={{
            background:T.white,border:`2px solid ${T.borderWarm}`,
            borderRadius:14,padding:'10px 12px',marginBottom:8,
            boxShadow:`0 3px 0 ${T.borderMid}`,
          }}>
            <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:8}}>
              <div style={{
                width:36,height:36,borderRadius:11,flexShrink:0,
                background:`linear-gradient(135deg,${a.c},${darken(a.c,-10)})`,
                display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:`0 2px 0 ${darken(a.c,15)}`,
              }}>
                <span style={{fontFamily:"'Baloo 2',sans-serif",fontSize:11,fontWeight:800,color:'#fff'}}>{a.init}</span>
              </div>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:12,fontWeight:800,color:T.ink}}>{a.name}</div>
                <div style={{fontFamily:"'Nunito',sans-serif",fontSize:9,color:T.inkMuted,fontWeight:600}}>
                  Child: {a.child} · Age {a.age}
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:11,fontWeight:800,color:T.coral}}>{a.time}</div>
                <Tag label={a.type} color={T.peachDk} bg={T.peachLt} border={T.peach}/>
              </div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <Btn label="Join Call" sm full color={T.coral} textColor="#fff" icon="video-outline"/>
              <Btn label="Patient Data" sm full color={T.surfAlt} textColor={T.inkBody} icon="folder-account-outline"/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function TitlePage() {

    {n:'01',name:'Welcome',desc:'Meadow bg, feature cards, get started CTA',color:T.mint},
    {n:'02',name:'Login',desc:'Warm header, email/password, OAuth buttons',color:T.sky},
    {n:'03',name:'Sign Up',desc:'Multi-field form, concern chip multi-select',color:T.coral},
    {n:'04',name:'Home',desc:'XP bar, streak, daily mission, today\'s plan',color:T.peach},
    {n:'05',name:'Games',desc:'8 ABA games, skill tags, tier locking',color:T.lavender},
    {n:'06',name:'Screener',desc:'M-CHAT paginated deck, YES/NO big buttons',color:T.teal},
    {n:'07',name:'Specialist',desc:'KPI grid, appointment cards, join call',color:T.rose},
  ];
  return (
    <div className="page title-page">
      <div className="tp-logo-wrap">
        <img src="../../assets/logo.jpeg" alt="NeuroChain"
          style={{width:260,height:80,objectFit:'contain',mixBlendMode:'multiply',display:'block'}}/>
      </div>
      <div className="tp-tagline">UI Kit · 7 Production Screens · May 2026</div>
      <div className="tp-grid">
        {screens.map(s=>(
          <div key={s.n} className="tp-card">
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div className="tp-dot" style={{background:s.color}}/>
              <div className="tp-screen-num">Screen {s.n}</div>

}

// ══════════════════════════════════════════════
// MAIN PRINT LAYOUT
// ══════════════════════════════════════════════
function PrintDoc() {
  const screens = [
    { label:'01 Welcome',    el:<WelcomeContent/> },
    { label:'02 Login',      el:<LoginContent/> },
    { label:'03 Sign Up',    el:<SignUpContent/> },
    { label:'04 Home',       el:<HomeContent/> },
    { label:'05 Games',      el:<GamesContent/> },
    { label:'06 Screener',   el:<ScreenerContent/> },
    { label:'07 Specialist', el:<SpecialistContent/> },
  ];

  // Group into pairs for 2-up landscape layout
  const pairs = [];
  for(let i=0;i<screens.length;i+=2) pairs.push(screens.slice(i,i+2));

  return (
    <div>
      {/* Title page */}
      <TitlePage/>

      {/* Screen pairs */}
      {pairs.map((pair,pi)=>(
        <div key={pi} className="page" style={{
          background:'radial-gradient(ellipse at 30% 30%,#1e1040 0%,#0d0a1a 70%)',
        }}>
          <div className="two-up">
            {pair.map(s=>(
              <Phone key={s.label} label={s.label}>{s.el}</Phone>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrintDoc/>);

// Auto-print: wait for fonts + Babel render
document.fonts.ready.then(() => {
  setTimeout(() => window.print(), 600);
});
</script>
</body>
</html>
