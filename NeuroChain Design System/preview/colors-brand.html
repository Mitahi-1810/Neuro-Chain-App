<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #F8FAFC; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .swatch { border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(15,23,42,0.07); }
  .swatch-color { height: 64px; }
  .swatch-info { background: #fff; padding: 10px 12px; }
  .swatch-name { font-size: 12px; font-weight: 700; color: #0F172A; }
  .swatch-hex  { font-size: 11px; color: #64748B; font-family: monospace; margin-top: 2px; }
  .group-label { font-size: 11px; font-weight: 700; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.8px; margin: 16px 0 8px; grid-column: 1/-1; }
</style>
</head>
<body>
<div class="grid">
  <div class="group-label">Primary</div>
  <div class="swatch"><div class="swatch-color" style="background:#2563EB;"></div><div class="swatch-info"><div class="swatch-name">Primary</div><div class="swatch-hex">#2563EB</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#1D4ED8;"></div><div class="swatch-info"><div class="swatch-name">Primary Dark</div><div class="swatch-hex">#1D4ED8</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#BFDBFE; border:1px solid #E2E8F0;"></div><div class="swatch-info"><div class="swatch-name">Primary Mid</div><div class="swatch-hex">#BFDBFE</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#EFF6FF; border:1px solid #E2E8F0;"></div><div class="swatch-info"><div class="swatch-name">Primary Light</div><div class="swatch-hex">#EFF6FF</div></div></div>

  <div class="group-label">Secondary / Accent</div>
  <div class="swatch"><div class="swatch-color" style="background:#7C3AED;"></div><div class="swatch-info"><div class="swatch-name">Secondary</div><div class="swatch-hex">#7C3AED</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#EDE9FE; border:1px solid #E2E8F0;"></div><div class="swatch-info"><div class="swatch-name">Secondary Light</div><div class="swatch-hex">#EDE9FE</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#06B6D4;"></div><div class="swatch-info"><div class="swatch-name">Accent Cyan</div><div class="swatch-hex">#06B6D4</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#ECFEFF; border:1px solid #E2E8F0;"></div><div class="swatch-info"><div class="swatch-name">Accent Light</div><div class="swatch-hex">#ECFEFF</div></div></div>
</div>
</body>
</html>
