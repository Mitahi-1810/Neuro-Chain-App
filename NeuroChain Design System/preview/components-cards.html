<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F8FAFC; padding: 20px; font-family: 'Inter', sans-serif; display: flex; gap: 12px; flex-wrap: wrap; }
  .card {
    border-radius: 20px;
    padding: 20px;
    width: 200px;
  }
  .card-default   { background: #FFFFFF; box-shadow: 0 4px 10px rgba(15,23,42,0.07); }
  .card-soft      { background: #F1F5F9; box-shadow: 0 4px 10px rgba(15,23,42,0.05); }
  .card-accent    { background: #EFF6FF; box-shadow: 0 4px 10px rgba(15,23,42,0.06); }
  .card-primary   { background: #2563EB; box-shadow: 0 4px 14px rgba(37,99,235,0.30); }
  .card-bordered  { background: #FFFFFF; box-shadow: 0 4px 10px rgba(15,23,42,0.07); border: 1px solid #E2E8F0; }
  .tag { font-size: 10px; font-weight: 700; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .title { font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700; color: #0F172A; }
  .title-light { color: #FFFFFF; }
  .desc  { font-size: 12px; color: #64748B; margin-top: 5px; line-height: 1.5; }
  .desc-light { color: rgba(255,255,255,0.8); }
</style>
</head>
<body>
  <div class="card card-default">
    <div class="tag">default</div>
    <div class="title">Today's Plan</div>
    <div class="desc">White surface, md shadow, 20px radius</div>
  </div>
  <div class="card card-soft">
    <div class="tag">soft</div>
    <div class="title">Weekly Summary</div>
    <div class="desc">Surface alt background, subtle elevation</div>
  </div>
  <div class="card card-accent">
    <div class="tag">accent</div>
    <div class="title">ABA Therapy Games</div>
    <div class="desc">Primary-light background, featured sections</div>
  </div>
  <div class="card card-primary">
    <div class="tag" style="color:rgba(255,255,255,0.6);">primary</div>
    <div class="title title-light">Premium Plan</div>
    <div class="desc desc-light">Inverted card for promotions</div>
  </div>
  <div class="card card-bordered">
    <div class="tag">bordered</div>
    <div class="title">Game Card</div>
    <div class="desc">Border + shadow for game list items</div>
  </div>
</body>
</html>
